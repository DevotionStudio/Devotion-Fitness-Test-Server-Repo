<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 420" role="img" aria-labelledby="title desc">
  <title id="title">Devotion animated wordmark</title>
  <desc id="desc">Devotion wordmark with the V mark integrated as the letter V.</desc>
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="52%" r="62%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity=".42"/>
      <stop offset="46%" stop-color="#2d145c" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#0d0818" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="v-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="54%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="bar-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="plate-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9f7aea"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="violet-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .48 0 0 0 0 .23 0 0 0 0 .93 0 0 0 .62 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      :root {
        color-scheme: dark;
      }

      .halo {
        fill: url(#bg-glow);
        transform-origin: 660px 210px;
        animation: halo 5.2s cubic-bezier(.2, .7, .2, 1) infinite;
      }

      .word {
        fill: #fffdf8;
        font-family: "Plus Jakarta Sans", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 238px;
        font-weight: 800;
        letter-spacing: -8px;
        dominant-baseline: middle;
      }

      .word-left {
        animation: leftSettle 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      .word-right {
        animation: rightSettle 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      .mark-motion {
        transform-box: fill-box;
        transform-origin: center;
        animation: markSettle 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
        filter: url(#violet-glow);
      }

      .bar {
        fill: none;
        stroke: url(#bar-stroke);
        stroke-width: 12;
        stroke-linecap: round;
        stroke-dasharray: 155;
        stroke-dashoffset: 155;
        animation: drawBar 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      .plate {
        fill: url(#plate-fill);
        transform-box: fill-box;
        transform-origin: center;
      }

      .plate-left {
        animation: plateLeft 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      .plate-right {
        animation: plateRight 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      .v-body {
        fill: none;
        stroke: url(#v-stroke);
        stroke-width: 22;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 206;
        stroke-dashoffset: 206;
        animation: drawV 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      .dot {
        fill: #8b5cf6;
        transform-box: fill-box;
        transform-origin: center;
        animation: dotSettle 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      .impact-ring {
        fill: none;
        stroke: #8b5cf6;
        stroke-width: 3;
        opacity: 0;
        transform-origin: 510px 213px;
        animation: impactRing 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      .energy-line {
        fill: none;
        stroke: #ede9fe;
        stroke-width: 3;
        stroke-linecap: round;
        opacity: 0;
        animation: energyLine 5.2s cubic-bezier(.16, 1, .3, 1) infinite;
      }

      @keyframes leftSettle {
        0%, 9% { opacity: 0; transform: translateX(-52px); }
        20% { opacity: 1; transform: translateX(8px); }
        28%, 84% { opacity: 1; transform: translateX(0); }
        94%, 100% { opacity: 0; transform: translateX(-14px); }
      }

      @keyframes rightSettle {
        0%, 9% { opacity: 0; transform: translateX(52px); }
        20% { opacity: 1; transform: translateX(-8px); }
        28%, 84% { opacity: 1; transform: translateX(0); }
        94%, 100% { opacity: 0; transform: translateX(14px); }
      }

      @keyframes markSettle {
        0%, 8% { opacity: 0; transform: translateY(-10px) scale(.82); }
        18% { opacity: 1; transform: translateY(4px) scale(1.08); }
        29%, 84% { opacity: 1; transform: translateY(0) scale(1); }
        94%, 100% { opacity: 0; transform: translateY(4px) scale(.96); }
      }

      @keyframes drawV {
        0%, 10% { stroke-dashoffset: 206; }
        27%, 100% { stroke-dashoffset: 0; }
      }

      @keyframes drawBar {
        0%, 13% { stroke-dashoffset: 155; }
        28%, 100% { stroke-dashoffset: 0; }
      }

      @keyframes plateLeft {
        0%, 12% { opacity: 0; transform: translateX(14px) scale(.72); }
        20% { opacity: 1; transform: translateX(-5px) scale(1.08); }
        29%, 100% { opacity: 1; transform: translateX(0) scale(1); }
      }

      @keyframes plateRight {
        0%, 12% { opacity: 0; transform: translateX(-14px) scale(.72); }
        20% { opacity: 1; transform: translateX(5px) scale(1.08); }
        29%, 100% { opacity: 1; transform: translateX(0) scale(1); }
      }

      @keyframes dotSettle {
        0%, 12% { opacity: 0; transform: translateY(-24px) scale(.72); }
        22% { opacity: 1; transform: translateY(4px) scale(1.08); }
        30%, 100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes impactRing {
        0%, 17% { opacity: 0; transform: scale(.45); }
        25% { opacity: .38; transform: scale(1); }
        42%, 100% { opacity: 0; transform: scale(1.55); }
      }

      @keyframes energyLine {
        0%, 17% { opacity: 0; stroke-dasharray: 0 90; }
        24% { opacity: .72; stroke-dasharray: 42 90; }
        38%, 100% { opacity: 0; stroke-dasharray: 0 90; }
      }

      @keyframes halo {
        0%, 100% { opacity: .48; transform: scale(.98); }
        24% { opacity: .86; transform: scale(1.04); }
        60% { opacity: .56; transform: scale(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        .halo,
        .word-left,
        .word-right,
        .mark-motion,
        .bar,
        .plate-left,
        .plate-right,
        .v-body,
        .dot,
        .impact-ring,
        .energy-line {
          animation: none;
        }

        .bar,
        .v-body {
          stroke-dashoffset: 0;
        }

        .impact-ring,
        .energy-line {
          opacity: 0;
        }
      }
    </style>
  </defs>

  <ellipse class="halo" cx="660" cy="210" rx="500" ry="260"/>
  <circle class="impact-ring" cx="510" cy="213" r="80"/>
  <path class="energy-line" d="M354 154 C405 128 449 126 493 146"/>
  <path class="energy-line" d="M527 146 C574 126 621 130 668 158"/>
  <path class="energy-line" d="M382 292 C430 318 488 326 540 314"/>

  <text class="word word-left" x="74" y="226" textLength="318" lengthAdjust="spacingAndGlyphs">De</text>

  <g transform="translate(386 92) scale(2.48)">
    <g class="mark-motion">
      <path class="bar" d="M22 22 Q50 12 78 22"/>
      <rect class="plate plate-left" x="10" y="14" width="14" height="16" rx="2.5"/>
      <rect class="plate plate-right" x="76" y="14" width="14" height="16" rx="2.5"/>
      <path class="v-body" d="M28 36 L50 84 L72 36"/>
      <circle class="dot" cx="50" cy="32" r="5.5"/>
    </g>
  </g>

  <text class="word word-right" x="594" y="226" textLength="636" lengthAdjust="spacingAndGlyphs">otion</text>
</svg>
