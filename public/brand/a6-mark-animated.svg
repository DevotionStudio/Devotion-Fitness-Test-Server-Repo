<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
  <title id="title">Devotion animated V mark</title>
  <desc id="desc">Standalone animated Devotion V mark.</desc>
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="54%" r="55%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity=".46"/>
      <stop offset="52%" stop-color="#2d145c" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#0d0818" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="v-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="54%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="bar-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="plate-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9f7aea"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .48 0 0 0 0 .23 0 0 0 0 .93 0 0 0 .66 0" result="violet"/>
      <feMerge>
        <feMergeNode in="violet"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      :root {
        color-scheme: dark;
      }

      .halo {
        fill: url(#bg-glow);
        transform-origin: 210px 210px;
        animation: halo 4.8s cubic-bezier(.2, .7, .2, 1) forwards;
      }

      .mark-motion {
        transform-box: fill-box;
        transform-origin: center;
        animation: mark 4.8s cubic-bezier(.16, 1, .3, 1) forwards;
        filter: url(#glow);
      }

      .bar {
        fill: none;
        stroke: url(#bar-stroke);
        stroke-width: 7;
        stroke-linecap: round;
        stroke-dasharray: 155;
        stroke-dashoffset: 155;
        animation: drawBar 4.8s cubic-bezier(.16, 1, .3, 1) forwards;
      }

      .plate {
        fill: url(#plate-fill);
        transform-box: fill-box;
        transform-origin: center;
      }

      .plate-left {
        animation: plateLeft 4.8s cubic-bezier(.16, 1, .3, 1) forwards;
      }

      .plate-right {
        animation: plateRight 4.8s cubic-bezier(.16, 1, .3, 1) forwards;
      }

      .v-body {
        fill: none;
        stroke: url(#v-stroke);
        stroke-width: 13;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 206;
        stroke-dashoffset: 206;
        animation: drawV 4.8s cubic-bezier(.16, 1, .3, 1) forwards;
      }

      .dot {
        fill: #8b5cf6;
        transform-box: fill-box;
        transform-origin: center;
        animation: dot 4.8s cubic-bezier(.16, 1, .3, 1) forwards;
      }

      .ring {
        fill: none;
        stroke: #8b5cf6;
        stroke-width: 2;
        opacity: 0;
        transform-origin: 210px 210px;
        animation: ring 4.8s cubic-bezier(.16, 1, .3, 1) forwards;
      }

      @keyframes mark {
        0%, 8% { opacity: 0; transform: translateY(-8px) scale(.84); }
        20% { opacity: 1; transform: translateY(4px) scale(1.08); }
        32%, 100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes drawV {
        0%, 10% { stroke-dashoffset: 206; }
        28%, 100% { stroke-dashoffset: 0; }
      }

      @keyframes drawBar {
        0%, 13% { stroke-dashoffset: 155; }
        30%, 100% { stroke-dashoffset: 0; }
      }

      @keyframes plateLeft {
        0%, 12% { opacity: 0; transform: translateX(12px) scale(.72); }
        20% { opacity: 1; transform: translateX(-4px) scale(1.08); }
        30%, 100% { opacity: 1; transform: translateX(0) scale(1); }
      }

      @keyframes plateRight {
        0%, 12% { opacity: 0; transform: translateX(-12px) scale(.72); }
        20% { opacity: 1; transform: translateX(4px) scale(1.08); }
        30%, 100% { opacity: 1; transform: translateX(0) scale(1); }
      }

      @keyframes dot {
        0%, 12% { opacity: 0; transform: translateY(-22px) scale(.72); }
        22% { opacity: 1; transform: translateY(4px) scale(1.08); }
        30%, 100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes ring {
        0%, 17% { opacity: 0; transform: scale(.55); }
        25% { opacity: .34; transform: scale(1); }
        44%, 100% { opacity: 0; transform: scale(1.55); }
      }

      @keyframes halo {
        0%, 100% { opacity: .56; transform: scale(.98); }
        24% { opacity: .9; transform: scale(1.05); }
        60% { opacity: .62; transform: scale(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        .halo,
        .mark-motion,
        .bar,
        .plate-left,
        .plate-right,
        .v-body,
        .dot,
        .ring {
          animation: none;
        }

        .bar,
        .v-body {
          stroke-dashoffset: 0;
        }

        .ring {
          opacity: 0;
        }
      }
    </style>
  </defs>

  <circle class="halo" cx="210" cy="218" r="178"/>
  <circle class="ring" cx="210" cy="214" r="94"/>

  <g transform="translate(84 68) scale(2.52)">
    <g class="mark-motion">
      <path class="bar" d="M22 22 Q50 12 78 22"/>
      <rect class="plate plate-left" x="10" y="14" width="14" height="16" rx="2.5"/>
      <rect class="plate plate-right" x="76" y="14" width="14" height="16" rx="2.5"/>
      <path class="v-body" d="M28 36 L50 84 L72 36"/>
      <circle class="dot" cx="50" cy="32" r="5.5"/>
    </g>
  </g>
</svg>
